name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Swift test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show tool versions
        run: |
          swift --version
          xcodebuild -version

      - name: Run tests
        run: swift test

      - name: Check whitespace
        run: git diff --check

      - name: Check shell scripts
        run: bash -n scripts/package-release.sh scripts/update-homebrew-formula.sh scripts/verify-homebrew-formula.sh scripts/install-ascendkit.sh scripts/verify-release-assets.sh scripts/preflight-public-release.sh

      - name: Package release archive
        run: scripts/package-release.sh

      - name: Verify package checksum
        run: cd dist && shasum -a 256 -c *.tar.gz.sha256
