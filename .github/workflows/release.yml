name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Package CLI
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Run tests
        run: swift test

      - name: Package release archive
        run: scripts/package-release.sh

      - name: Verify package checksum
        run: cd dist && shasum -a 256 -c *.tar.gz.sha256

      - name: Upload release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/*.tar.gz dist/*.tar.gz.sha256 --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/*.tar.gz dist/*.tar.gz.sha256 \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi

      - name: Generate Homebrew formula
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/update-homebrew-formula.sh

      - name: Verify Homebrew formula
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/verify-homebrew-formula.sh --version "${GITHUB_REF_NAME}"

      - name: Upload Homebrew formula
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" Formula/ascendkit.rb --clobber

      - name: Upload installer script
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" scripts/install-ascendkit.sh --clobber

      - name: Verify uploaded release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/verify-release-assets.sh --version "${GITHUB_REF_NAME}"
